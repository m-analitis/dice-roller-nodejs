<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<title>Dice Roller Server</title>
</head>
<body>
	<h1>Yahtzee Dice Roller Server</h1>
	<p>This API generates results for rolling 6-sided dice. It can be accessed at
		https://dice-roller-nodejs-f7ayd2a0b0f6eng4.centralus-01.azurewebsites.net/roll?num=x,
		where x is the number of dice to roll. Here is an example:
	</p><br />

	<select id="numDice">
		<option>1</option>
		<option>2</option>
		<option>3</option>
		<option>4</option>
		<option>5</option>
	</select>
	<button type="button" onclick="rollDice()">Roll</button> <br />
	<div id="rolls"></div><br /><br /><br />

	<script>
		async function rollDice() {
			const n = document.getElementById("numDice").value
			const fetchString = "/roll?num="+n
			const response = await fetch(fetchString)
			const responseText = await response.text()
			document.getElementById("rolls").innerHTML = responseText
		}
	</script>
</body>
</html>
